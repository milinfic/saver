<div class="form-container">
  <h2>{{ header }}</h2>

  <form [formGroup]="expenseNewType" (ngSubmit)="onSubmit()">

    <!-- Nome -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nome *</mat-label>
      <mat-icon matPrefix>description</mat-icon>
      <input matInput formControlName="name" placeholder="Digite a descrição do gasto">
      <mat-error *ngIf="expenseNewType.get('name')?.invalid && expenseNewType.get('name')?.touched">
        Descrição é obrigatória e deve ter pelo menos 3 caracteres.
      </mat-error>
    </mat-form-field>

    <!-- Coluna -->
     <!-- Tipo do gasto -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Grupo *</mat-label>
      <mat-icon matPrefix>currency_exchange</mat-icon>      
      <mat-select formControlName="column">
        <mat-option [value]="null" disabled>- Selecione -</mat-option>
        <mat-option *ngFor="let type of expenseGroups" [value]="type.id">
          {{ type.name }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="expenseNewType.get('column')?.invalid && expenseNewType.get('column')?.touched">
        Grupo é obrigatório.
      </mat-error>
    </mat-form-field>

    <!-- Botão -->
    <button mat-raised-button type="submit" [disabled]="expenseNewType.invalid" class="btn-confirm full-width">
      {{ expenseTypeId ? 'Atualizar' : 'Cadastrar' }}
    </button>
  </form>
</div>
