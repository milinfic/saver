<div class="container-menu-dash">
  <h2>Menu</h2>
</div>

<!-- Cards -->
<div class="grid-container">
  <!-- Receita -->
  <app-dash-card
  [title]="'Receita Total'"
  [value]="totalRevenues"
  [smallInfo]="'↑ 12.5% vs mês anterior'"
  [smallInfoClass]="'geen-color'"
  [matIcon]="'attach_money'">
  </app-dash-card>

  <!-- Despera -->
  <app-dash-card
  [title]="'Despesas Total'"
  [value]="totalExpenses"
  [smallInfo]="'↓ 8.3% vs mês anterior'"
  [smallInfoClass]="'red-color'"
  [matIcon]="'trending_down'">
  </app-dash-card>
  
  <app-dash-card
  [title]="'Despesas vs Receita'"
  [value]="percentage"
  [smallInfo]="'↓ 4.2% vs mês anterior'"
  [smallInfoClass]="'blue-color'"
  [matIcon]="'percent'">
</app-dash-card>
</div>
