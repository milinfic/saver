<mat-toolbar color="primary" class="navbar-toolbar">
  <div class="navbar-left">
    <span class="logo">MinhaApp</span>

    <!-- Hamburger menu for mobile -->
    <button mat-icon-button [matMenuTriggerFor]="mobileMenu" class="hamburger-button" *ngIf="isMobile">
      <mat-icon>menu</mat-icon>
    </button>

    <!-- Desktop menus -->
    <div class="desktop-menus" *ngIf="!isMobile">
      <button mat-button routerLink="/dashboard" routerLinkActive="active" class="menu-button" [class.active]="activeParent === 'dashboard'">
        <mat-icon>dashboard</mat-icon>
        Dashboard
      </button>

      <button mat-button [matMenuTriggerFor]="expenseMenu" class="menu-button" [class.active]="activeParent === 'expense'">
        Despesas
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #expenseMenu="matMenu">
        <button mat-menu-item routerLink="/expense/list" routerLinkActive="active">
          <mat-icon>list</mat-icon>
          <span>Listar Despesas</span>
        </button>
        <button mat-menu-item routerLink="/expense/listType" routerLinkActive="active">
          <mat-icon>category</mat-icon>
          <span>Tipos de Despesas</span>
        </button>
        <button mat-menu-item routerLink="/expense/listGroup" routerLinkActive="active">
          <mat-icon>groups</mat-icon>
          <span>Grupos de Despesas</span>
        </button>
      </mat-menu>

      <button mat-button [matMenuTriggerFor]="revenueMenu" class="menu-button" [class.active]="activeParent === 'revenue'">
        Receitas
        <mat-icon>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #revenueMenu="matMenu">
        <button mat-menu-item routerLink="/revenue/list" routerLinkActive="active">
          <mat-icon>list</mat-icon>
          <span>Listar Receitas</span>
        </button>
        <button mat-menu-item routerLink="/revenue/listType" routerLinkActive="active">
          <mat-icon>category</mat-icon>
          <span>Tipos de Receitas</span>
        </button>
        <button mat-menu-item routerLink="/revenue/listGroup" routerLinkActive="active">
          <mat-icon>groups</mat-icon>
          <span>Grupos de Receitas</span>
        </button>
      </mat-menu>
    </div>
  </div>

  <span class="spacer"></span>

  <button mat-button class="logout-button" (click)="logout()" *ngIf="!isMobile">
    <mat-icon>logout</mat-icon>
    Sair
  </button>

  <!-- Mobile menu -->
  <mat-menu #mobileMenu="matMenu" class="mobile-menu">
    <button mat-menu-item routerLink="/dashboard">
      <mat-icon>dashboard</mat-icon>
      <span>Dashboard</span>
    </button>
    <button mat-menu-item routerLink="/expense/list">
      <mat-icon>list</mat-icon>
      <span>Listar Despesas</span>
    </button>
    <button mat-menu-item routerLink="/expense/listType">
      <mat-icon>category</mat-icon>
      <span>Tipos de Despesas</span>
    </button>
    <button mat-menu-item routerLink="/expense/listGroup">
      <mat-icon>groups</mat-icon>
      <span>Grupos de Despesas</span>
    </button>
    <button mat-menu-item routerLink="/revenue/list">
      <mat-icon>list</mat-icon>
      <span>Listar Receitas</span>
    </button>
    <button mat-menu-item routerLink="/revenue/listType">
      <mat-icon>category</mat-icon>
      <span>Tipos de Receitas</span>
    </button>
    <button mat-menu-item routerLink="/revenue/listGroup">
      <mat-icon>groups</mat-icon>
      <span>Grupos de Receitas</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Sair</span>
    </button>
  </mat-menu>
</mat-toolbar>
